<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <defs>
    <!-- Background Gradient for Icon -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#302060" />
      <stop offset="50%" stop-color="#1e3a78" />
      <stop offset="100%" stop-color="#2ca7e5" />
    </linearGradient>
    <!-- Inner Badge Gradient -->
    <linearGradient id="badgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2fa7e8" />
      <stop offset="100%" stop-color="#1c75bc" />
    </linearGradient>
  </defs>

  <!-- Icon Rounded Box -->
  <rect x="10" y="10" width="120" height="120" rx="24" ry="24" fill="url(#iconGradient)" />

  <!-- Outer Concentric Rings -->
  <circle cx="70" cy="70" r="48" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.9" />
  <circle cx="70" cy="70" r="41" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.85" />
  <circle cx="70" cy="70" r="34" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.95" />
  <circle cx="70" cy="70" r="27" fill="none" stroke="#ffffff" stroke-width="3.5" opacity="0.9" />

  <!-- Inner Cyan Badge -->
  <circle cx="70" cy="70" r="21" fill="url(#badgeGradient)" />

  <!-- Styled 'S' in inner badge -->
  <path d="M 74 61 C 74 58.5 71.5 56.5 68 56.5 C 64.5 56.5 62.5 58 62.5 60.5 C 62.5 66 75.5 65.5 75.5 72.5 C 75.5 76 72.5 78.5 68 78.5 C 63 78.5 61 75.5 60.5 73" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Wordmark Text "streamlivr" -->
  <g transform="translate(150, 95)">
    <!-- "stream" text -->
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="300" fill="#2E1C4D" letter-spacing="-1">stream</text>
    <!-- "livr" text -->
    <text x="210" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="300" fill="#2E1C4D" letter-spacing="-1">livr</text>
    <!-- Cyan Accent Bar under "livr" -->
    <rect x="212" y="8" width="125" height="12" rx="3" ry="3" fill="#29A7E4" />
  </g>
</svg>
